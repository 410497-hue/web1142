<head>
             <title>0323-2CSS動畫

             </title>
            <style>
div{
          width: 200px;
        height: 100px;
      margin: 100px;
    }
        
        @keyframes kd1{
                0%{background: linear-gradient(0deg,red,blue);}
                8%{background: linear-gradient(30deg,red,blue);}
                17%{background: linear-gradient(60deg,red,blue);}
                25%{background: linear-gradient(90deg,red,blue);}
                33%{background: linear-gradient(120deg,red,blue);}
                42%{background: linear-gradient(150deg,red,blue);}
                58%{background: linear-gradient(180deg,red,blue);}
                58%{background: linear-gradient(210deg,red,blue);}
                67%{background: linear-gradient(240deg,red,blue);}
                75%{background: linear-gradient(270deg,red,blue);}
                83%{background: linear-gradient(300deg,red,blue);}
                92%{background: linear-gradient(330deg,red,blue);}
                100%{background: linear-gradient(360deg,red,blue);}

 }

    #d1{
        background: linear-gradient(to bottom,red,yellow);
       animation: kd1 0.5s infinite linear;
    }

#d2{
     height: 50px;
     background: linear-gradient(90deg,red,orange,yellow,green,blue,indigo,violet);
}

#d3{
    background: linear-gradient(90deg,red 33%,white 33%,white 67%,blue 67%);
}   
#d4{
      height: 50px; 
     background:repeating-linear-gradient(45deg,red 30%,white 35%,green 40%,white 45%,red 50%) ;
}


#r1{
    height: 200px;
    background: repeating-radial-gradient(circle,yellow,white 50%,black 70%);
}

#r2{
    height: 200px;
    background: repeating-radial-gradient(circle,gray 20%,white 30%,gray 40%);
    }

#c1{
     height: 200px;
     background: conic-gradient(red,yellow,green,cyan,blue,magenta,red);
}

#c2{
     height: 200px;
     background:repeating-conic-gradient(red 10%,white 15%,red 10%);
 

}







            </style>
            </head>
<body>
       
    <div id="d1"></div>
       <div id="d2"></div>
       <div id="d3"></div>
       <div id="d4"></div>
    
       <div id="r1"></div>
       <div id="r2"></div>

       <div id="c1"></div>
       <div id="c2"></div>







    </body>





</html>
