<html>
<head>
	<title>0525-宇宙射擊遊戲</title>
	<style>
		@keyframes bg_move {
			0%{background-position-y: 0px;}
			100%{background-position-y: 216px;}
		}
		#universe {
			width: 600px;
			height: 600px;
			background: url("pic/bg_stars.jpg");
			animation: bg_move 2s linear infinite paused;
			position: relative;
		}
		#ship {
			width: 40px;
			height: 60px;
			position: absolute;
			top: 540px;
			left: 280px;
		}
		.ufo {
			width: 60px;
			height: 40px;
			position: absolute;
		}
		.bullet {
			width: 4px;
			height: 6px;
			background: red;
			border-radius: 100% 100% 0 0;
			position: absolute;
		}
	</style>
	<script>
		function getRand(min,max) {
			return Math.floor(Math.random() * (max - min + 1)) + min;
		}
		function showPos(obj) {
			obj.style.top=obj.pos.y + "px";
			obj.style.left=obj.pos.x + "px";
		}
		function die(obj) {
			clearInterval(obj.move);
			obj.remove();
		}
		function ship_move() {
			if(!gameing) return;
			if(ship.way["ArrowUp"] && ship.pos.y > 0) ship.pos.y--;
			else if(ship.way["ArrowDown"] && ship.pos.y < 540) ship.pos.y++;
			else if(ship.way["ArrowLeft"] && ship.pos.x > 0) ship.pos.x--;
			else if(ship.way["ArrowRight"] && ship.pos.x < 560) ship.pos.x++;
			showPos(ship);
		}
		function bullet_move(b) {
			if(b.pos.y < 0) {
				die(b);
			} else {
				b.pos.y--;
				showPos(b);
				var hit=Array.from(document.getElementsByClassName("ufo")).filter((u)=>{
					return (u.pos.x < b.pos.x) && (u.pos.x + 60 > b.pos.x + 4) && (u.pos.y + 40 >= b.pos.y);
				});
				if(hit.length>0) {
					die(b);
					hit.forEach((u)=>{
						die(u);
					});
					game_score += hit.length;
					document.getElementById("score").innerHTML=game_score;
				}
			}
		}
		function shoot() {
			if(!gameing) return;
			var b=document.createElement("div");
			b.className="bullet";
			b.pos={x:ship.pos.x+18, y:ship.pos.y-6};
			b.move=setInterval(bullet_move,5,b);
			document.getElementById("universe").appendChild(b);
		}
		function ufo_move(u) {
			if(u.pos.y > 560) {
				die(u);
				game_stop();
			} else {
				u.pos.x+=getRand(-3,3);
				u.pos.y++;
				showPos(u);
			}
		}
		function ufo_create() {
			if(!gameing) return;
			var u=document.createElement("img");
			u.src="pic/ufo.png";
			u.className="ufo";
			u.pos={x:getRand(0,540),y:-40};
			showPos(u);
			u.move=setInterval(ufo_move,20,u);
			document.getElementById("universe").appendChild(u);
		}
		function game_start() {
			if(gameing) return;
			gameing=true;
			game_score=0;
			document.getElementById("score").innerHTML=game_score;
			setInterval(ufo_create,1000);
			document.getElementById("bgm").play();
			document.getElementById("universe").style.animationPlayState="running";
		}
		function game_stop() {
			gameing=false;
			document.getElementById("bgm").pause();
			document.getElementById("universe").style.animationPlayState="paused";
			Array.from(document.getElementsByClassName("ufo")).forEach((u)=>die(u));
		}
		function game_init() {
			ship=document.getElementById("ship");
			ship.pos={x:280,y:540};
			ship.way={"ArrowLeft":0,"ArrowRight":0,"ArrowUp":0,"ArrowDown":0};
			ship.move=setInterval(ship_move,5);
			gameing=false;
		}
		function mykeydown() {
			event.preventDefault();
			if(Object.keys(ship.way).includes(event.key)) {
				ship.way[event.key]=1;
			} else if(event.key==" ") {
				shoot();
			}
		}
		function mykeyup() {
			event.preventDefault();
			if(Object.keys(ship.way).includes(event.key)) {
				ship.way[event.key]=0;
			}
		}
	</script>
</head>
<body onload="game_init()" onkeydown="mykeydown()" onkeyup="mykeyup()">
	<audio loop id="bgm"><source src="bgm.mp3"></audio>
	<div>得分：<span id="score">0</span>分</div>
	<div id="universe" onclick="game_start()">
		<img id="ship" src="pic/ship.png">
	</div>
</body>
</html>
