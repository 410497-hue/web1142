<html>
 <head>
         <title>0316-CSS選擇器與顏色設定</title>
        
        <style>
                    /*CSS註解*/
                    /*CSS基礎語法
                    選擇器 Selector { 
                         property: value;
                         屬性:設定值;
                         屬性:設定值;
                  }
                           選擇器有三種寫法: html_tag / #id / .class  
                      */
                       /*
                         display:block; 設定為區塊元，預設是 頁寬內容高， 可設定寬高；自己成行，不與其他元素同行
                         display:inline；設定為行內元素，
                      
                      
                      div{
                           width:200px ;
                           height:200px;
                           display: inline-block;/* div 的預設值是block*/
                        }
                      span{

                    width: 200px;
                     height: 200px;
                    display: inline-block;/*span的預設值是inline*/
                }
                    #d1{
                        background-color: black;
                        background-color: aquamarine;
                    }
                /*同一個屬性，後寫的設定會覆蓋先寫的設定。與寫在class順序無關
                 除非先有 !important 改變重要性
                 優先順序: !important > #id > .c > html_tag
                */
                .c1{
                    background-color: greenyellow;
                }
                .c2{
                    background-color: aqua;
                }
              /*CSS顏色的表示法:
              1 常見英文單字
              2 #RRGGBB #000000 #FFFFFF
              3 rgb(r,g,b) 0~255
              4 hs1(h色相0~360,s彩度0%~100%,L亮度0%~100%)
              5 rgba(r g b a可見度0~1)
              6




    </style>
        </head>
        <body>
             <!--  div  區塊容器block -->
             <div id="d1" class="c1"></div>
             <div id="d2" class="c2"></div>
         
        
             <!--  span  行內容器inline -->
             <span id="d1" class="c1"></span>
             <span id="d2" class="c2"></span>
          
        
        
        
        
        
        
        
        
        </body>
</html>
