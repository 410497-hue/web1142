<html>
    <head>
        <title>0330-CSS容器大小及位置</title>
<style>

div{
    margin-bottom: 10px;
}
/* 容器大小，由外而內:
   margin邊界
   border邊框
   padding填充
   width/height 寬/高
   box-sizing: content-box 寬高是內容大小，填充會影響容器大小
               border-box 寬高是框線大小，填充不會影響容器大小
*/
/*




*/
#d1{
      width: 100px;
      height: 100px;
    border: solid 5px black;
    border-color: red yellow blue green;
    border-width: 10px 20px 30px 40px;
}

#d2{
      width: 100px;
      height: 50px;
      border: solid 1px black;
      border-radius: 50%;
}
#d3{
      width: 400px;
      height: 400px;
      border: solid 1px black;
    


}

#d31{

    
      width: 50px;
      height: 50px;
      border: solid 1px red;
      position: absolute;
      top: 0px;
      left: 0px;
      z-index: 20;
}




#d32{
      width: 50px;
      height: 50px;
      border: solid 1px blue;
  transform: translate(10px.10px) rotate(45deg) scale(2,0,5);


}

#d4{
      width: 50px;
      height: 50px;
      border: solid 1px green;
      position: relative;
      top: 10px;
      left: 10px;
    
}

    
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    </style>
    
    
    
    
    
    
    
    </head>
<body>

<div id=d1>123</div>
<div id=d2>123</div>






</body>







</html>
