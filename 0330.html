<html>
<head>
	<title>0330-CSS容器大小形狀及位置</title>
	<style>
		div {
			margin-bottom: 10px;
		}
		/*	容器大小，由外而內：
			margin 邊界
			border 框線
			padding 填充
			width/height 寬/高
			box-sizing: content-box 寬高是內容大小，填充會影響容器大小
						border-box 寬高是框線大小，填充不會影響容器大小
		*/
		/*	設定方向：top/right/bottom/left
				上/右/下/左
				上/左右/下
				上下/左右
				全四向
		*/
		/*	框線設定：
			border-color: 框線顏色/transparent透明
			border-width: 框線粗細
			border-style: 框線樣式 solid實線/dashed虛線/dotted點點/double雙線
			border-radius: 圓角半徑 絕對半徑 px / 相對半徑 %
		*/
		#d1 {
			width: 0px;
			height: 0px;
			border: solid 50px black;
			border-color: red yellow blue green;
			border-width: 10px 20px 30px 40px;
		}
		#d2 {
			width:100px;
			height:50px;
			border: solid 1px black;
			border-radius: 50%;
		}
		/*	position:relative;
				相對於自己原來的位置，或是 設定作為父容器。
			position:absolute;
				相對於body或父容器的位置設定。
			top/left: 與上/左的距離。
		*/
		#d3 {
			width: 400px;
			height: 400px;
			border: solid 1px black;
			position: relative;
		}
		#d31 {
			width: 50px;
			height: 50px;
			background-color: red;
			position: absolute;
			top:0px;
			left:0px;
			z-index: 30;
		}
		#d32 {
			width: 50px;
			height: 50px;
			background-color: blue;
			position: absolute;
			top:10px;
			left:10px;
			z-index: 20;
		}
		/*	transform 變形
			rotate(deg) 旋轉deg度角
			translate(x,y) 位移
			scale(x,y) 倍率
		*/
		#d4 {
			width: 100px;
			height: 100px;
			background-color: green;
		}

		#t1 {
			width:0px;
			height:0px;
			border:solid 50px transparent;
			border-bottom-color:green;
			border-top-width:0;
			margin: 0 0 0 40px;
		}
		#t2 {
			width:40px;
			height:0px;
			border:solid 50px transparent;
			border-bottom-color:green;
			border-top-width:0;
			margin: 0 0 0 20px;
		}
		#t3 {
			width:80px;
			height:0px;
			border:solid 50px transparent;
			border-bottom-color:green;
			border-top-width:0;
			margin-bottom: 0px;
		}
		#t4 {
			width: 40px;
			height: 60px;
			background-color: brown;
			margin: 0 0 0 70px;
		}
	</style>
</head>
<body>
	<div id="d1"></div>
	<div id="d2"></div>
	<div id="d3">
		<div id="d31"></div>
		<div id="d32"></div>
	</div>
	<div id="d4"></div>




	<!--Xmas tree--><hr>
	<div id="t1"></div>
	<div id="t2"></div>
	<div id="t3"></div>
	<div id="t4"></div>
</body>
</html>
